apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: backend-tls-certificate
  namespace: default
spec:
  secretName: backend-cert-secret
  issuerRef:
    name: letsencrypt-ci
    kind: ClusterIssuer
  dnsNames:
    - PLACEHOLDER

