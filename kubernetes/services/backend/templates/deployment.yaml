apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: {{ .Values.backend.deployment.replicaCount }}
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      serviceAccountName: db-client-sa
      containers:
        - name: backend
          image: "{{ .Values.project.region }}-{{ .Values.backend.deployment.image.registry }}/{{ .Values.project.id }}/{{ .Values.backend.deployment.image.repoName }}/{{ .Values.backend.deployment.image.name }}:{{ .Values.backend.deployment.image.tag }}"
          imagePullPolicy: {{ .Values.backend.deployment.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.deployment.containerPort }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET

          resources:
            requests:
              memory: "{{ .Values.backend.deployment.resources.requests.memory }}"
              cpu: "{{ .Values.backend.deployment.resources.requests.cpu }}"
            limits:
              memory: "{{ .Values.backend.deployment.resources.limits.memory }}"
              cpu: "{{ .Values.backend.deployment.resources.limits.cpu }}"

          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.backend.deployment.containerPort }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
            
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.deployment.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
        
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--health-check"
            - "--http-port=9090"
            - "--http-address=0.0.0.0" 
            - "{{ .Values.project.id }}:{{ .Values.project.region }}:{{ .Values.project.db_name }}"
          readinessProbe:
            httpGet:
              path: /readiness
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        