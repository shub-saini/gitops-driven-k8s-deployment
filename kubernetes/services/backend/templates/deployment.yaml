apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: {{ .Values.backend.deployment.replicaCount }}
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      serviceAccountName: db-client-sa
      containers:
        - name: backend
          image: "{{ .Values.backend.deployment.image.repository }}:{{ .Values.backend.deployment.image.tag }}"
          imagePullPolicy: {{ .Values.backend.deployment.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.deployment.containerPort }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET

          resources:
            requests:
              memory: "{{ .Values.backend.deployment.resources.requests.memory }}"
              cpu: "{{ .Values.backend.deployment.resources.requests.cpu }}"
            limits:
              memory: "{{ .Values.backend.deployment.resources.limits.memory }}"
              cpu: "{{ .Values.backend.deployment.resources.limits.cpu }}"

          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.backend.deployment.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.deployment.containerPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
        
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--structured-logs"
            - "--port=5432"
            - "staging-4769:us-central1:staging-sandbox-db-0d850b1d"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        